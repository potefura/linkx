<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="短縮リンク">
<meta property="og:description" content="ctkp on top">
<meta property="og:image" content="https://cdn.discordapp.com/attachments/1497817925019762778/1508057568940003531/Ddp2qqjM-1.gif?ex=6a14278e&is=6a12d60e&hm=eb59c77f5728a9db426e723f1fe01de8bfb3860bbb0266341b2945f5bf11e478&">
<meta name="theme-color" content="#5865F2">

<title>ctkp</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:gg sans, "Noto Sans JP", sans-serif;
}

body{
    background:#313338;
    color:#f2f3f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:950px;
    background:#2b2d31;
    border-radius:16px;
    padding:24px;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
    border:1px solid #1e1f22;
}

.title{
    font-size:30px;
    font-weight:700;
    margin-bottom:20px;
    color:white;
}

.top{
    display:flex;
    gap:12px;
    margin-bottom:20px;
}

input{
    flex:1;
    background:#1e1f22;
    border:none;
    border-radius:10px;
    padding:14px;
    color:white;
    font-size:16px;
    outline:none;
}

input::placeholder{
    color:#949ba4;
}

button{
    background:#5865f2;
    border:none;
    color:white;
    padding:14px 22px;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.15s;
}

button:hover{
    background:#4752c4;
}

textarea{
    width:100%;
    height:320px;
    background:#1e1f22;
    border:1px solid #2f3136;
    border-radius:12px;
    padding:16px;
    color:white;
    resize:none;
    outline:none;
    font-size:14px;
    line-height:1.5;
}

textarea:focus{
    border-color:#5865f2;
}
</style>
</head>
<body>

<div class="container">

    <div class="title">Link Generator</div>

    <div class="top">
        <input type="number" id="count" placeholder="生成数" value="5" min="1" max="1000">
        <button onclick="generateLinks()">生成</button>
    </div>

    <textarea id="allLinks" readonly placeholder="ここに生成されたリンクが表示されます"></textarea>

</div>

<script>
const chars =
"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

function randomString(length){

    let result = "";

    for(let i = 0; i < length; i++){

        result += chars[
            Math.floor(Math.random() * chars.length)
        ];
    }

    return result;
}

function generateLinks(){

    const count =
    parseInt(document.getElementById("count").value);

    let generatedLinks = [];

    for(let i = 0; i < count; i++){

        const len =
        Math.floor(Math.random() * 21) + 50;

        const url =
        "https://ctkpx.github.io/ctkp/?ctkp-" +
        randomString(len);

        generatedLinks.push(url);
    }

    document.getElementById("allLinks").value =
    generatedLinks.join("\n");
}
</script>

</body>
</html>
